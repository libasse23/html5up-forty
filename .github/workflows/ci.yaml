name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1
  DOCKER_REGISTRY: libassehanne

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: libassehanne
          password: dckr_pat_ypjIvDFrOUvARmdRwaosI3xAye4

      - name: Build Docker image
        run: docker build -t libassehanne/ci-html:1.0.1 .

      - name: Push Docker image
        run: docker push libassehanne/ci-html:1.0.1

  scan-trivy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Scan avec Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: libassehanne/ci-html:1.0.1
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

  deploy:
    needs: scan-trivy
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: docker pull libassehanne/ci-html:1.0.1

      - name: Stop old container
        run: docker stop ci-app || true

      - name: Remove old container
        run: docker rm ci-app || true

      - name: Run new container
        run: |
          docker run -d \
            -p 80:80 \
            --name ci-app \
            libassehanne/ci-html:1.0.1
